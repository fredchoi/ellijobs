<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ellijobs — Vibe Coding Jobs Hub | Coming Soon</title>
    <meta name="description" content="ellijobs — 바이브코딩 전용 일감 연결 허브. Coming Soon. Operated by ellilabs.">
    <meta name="keywords" content="ellijobs, vibe coding, 바이브코딩, 일감 매칭, freelance, ellilabs">
    <meta name="author" content="ellilabs">
    <link rel="canonical" href="https://www.ellijobs.com/">
    <link rel="alternate" hreflang="en" href="https://www.ellijobs.com/">
    <link rel="alternate" hreflang="ko" href="https://www.ellijobs.com/">
    <link rel="alternate" hreflang="x-default" href="https://www.ellijobs.com/">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="ellijobs">
    <meta property="og:title" content="ellijobs — Vibe Coding Jobs Hub | Coming Soon">
    <meta property="og:description" content="바이브코딩 전용 일감 연결 허브. Coming Soon. Operated by ellilabs.">
    <meta property="og:url" content="https://www.ellijobs.com/">
    <meta property="og:locale" content="ko_KR">
    <meta property="og:locale:alternate" content="en_US">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="ellijobs — Vibe Coding Jobs Hub">
    <meta name="twitter:description" content="바이브코딩 전용 일감 연결 허브. Coming Soon.">

    <meta name="robots" content="index, follow">

    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
      .lang-ko { display: none !important; }
      .lang-en { display: inline !important; }
      html.is-ko .lang-ko { display: inline !important; }
      html.is-ko .lang-en { display: none !important; }

      .soon-wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
        position: relative;
      }
      .soon-inner {
        max-width: 42rem;
        text-align: center;
        position: relative;
        z-index: 1;
      }
      .soon-symbol {
        display: inline-flex;
        margin-bottom: 2rem;
      }
      .soon-badge {
        display: inline-block;
        padding: 0.4rem 0.9rem;
        border: 1px solid rgba(34, 211, 238, 0.4);
        border-radius: 999px;
        color: var(--accent);
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 1.5rem;
      }
      .soon-title {
        font-size: clamp(2rem, 5vw, 3.25rem);
        font-weight: 700;
        line-height: 1.15;
        margin: 0 0 1.25rem;
      }
      .soon-desc {
        font-size: 1.05rem;
        line-height: 1.7;
        color: rgba(255, 255, 255, 0.72);
        margin: 0 0 2rem;
      }
      .soon-operator {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.6rem 1.1rem;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.78);
      }
      .soon-operator a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }
      .soon-operator a:hover { text-decoration: underline; }
      .soon-footer {
        margin-top: 3rem;
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.4);
      }
      .lang-toggle-fixed {
        position: fixed;
        top: 1.25rem;
        right: 1.25rem;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #fff;
        padding: 0.45rem 0.85rem;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
      }
      .lang-toggle-fixed:hover { background: rgba(255, 255, 255, 0.1); }
    </style>
  </head>
  <body>
    <button class="lang-toggle-fixed" id="langToggle" aria-label="Switch language">KR</button>
    <main class="soon-wrap">
      <div class="hero-grid"></div>
      <div class="soon-inner">
        <div class="soon-symbol">
          <svg width="84" height="84" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="hero-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
                <stop stop-color="#7B6CF6"/>
                <stop offset="1" stop-color="#00CEC9"/>
              </linearGradient>
              <clipPath id="hero-clip">
                <rect x="100" y="110" width="312" height="152"/>
                <rect x="100" y="262" width="230" height="150"/>
              </clipPath>
            </defs>
            <rect width="512" height="512" rx="114" fill="url(#hero-grad)"/>
            <g transform="rotate(-45, 256, 262)">
              <circle cx="256" cy="262" r="130" fill="none" stroke="#fff" stroke-width="48" clip-path="url(#hero-clip)"/>
              <line x1="256" y1="262" x2="390" y2="262" stroke="#fff" stroke-width="48" stroke-linecap="round"/>
            </g>
          </svg>
        </div>

        <div class="soon-badge">Coming Soon</div>

        <h1 class="soon-title">
          <span class="lang-ko">ellijobs</span>
          <span class="lang-en">ellijobs</span>
        </h1>

        <p class="soon-desc">
          <span class="lang-ko">
            바이브코딩 전용 일감 연결 허브.<br>
            AI와 함께 코드를 짓는 사람들을 위한 새로운 일감 매칭 플랫폼을 준비 중입니다.
          </span>
          <span class="lang-en">
            A jobs hub built for vibe coders.<br>
            A new matching platform for people who build with AI — coming soon.
          </span>
        </p>

        <div class="soon-operator">
          <span class="lang-ko">
            본 서비스는 <a href="https://ellilabs.com" target="_blank" rel="noopener noreferrer">엘리랩스</a>에서 운영 예정입니다.
          </span>
          <span class="lang-en">
            Operated by <a href="https://ellilabs.com" target="_blank" rel="noopener noreferrer">ellilabs</a>.
          </span>
        </div>

        <p class="soon-footer">© <span id="year"></span> ellijobs · ellilabs</p>
      </div>
    </main>

    <script>
      document.getElementById('year').textContent = new Date().getFullYear();

      const toggle = document.getElementById('langToggle');
      const html = document.documentElement;
      const saved = localStorage.getItem('lang');
      if (saved === 'ko') {
        html.classList.add('is-ko');
        toggle.textContent = 'EN';
      }
      toggle.addEventListener('click', () => {
        const isKo = html.classList.toggle('is-ko');
        toggle.textContent = isKo ? 'EN' : 'KR';
        html.lang = isKo ? 'ko' : 'en';
        localStorage.setItem('lang', isKo ? 'ko' : 'en');
      });
    </script>
  </body>
</html>
